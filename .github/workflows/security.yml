name: Security and Build Checks

on:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.8.5

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Backend syntax lint
        working-directory: backend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Terraform fmt
        run: terraform -chdir=infrastructure/terraform fmt -check

      - name: Terraform init
        run: terraform -chdir=infrastructure/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=infrastructure/terraform validate

      - name: npm audit backend
        working-directory: backend
        run: npm audit --audit-level=moderate || true

      - name: npm audit frontend
        working-directory: frontend
        run: npm audit --audit-level=moderate || true

      - name: Checkov Terraform scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infrastructure/terraform
          framework: terraform
          quiet: true
          soft_fail: true

      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: 0

      - name: Build backend image for scan
        run: docker build -t aegiscare-backend:ci backend

      - name: Build frontend image for scan
        run: docker build -t aegiscare-frontend:ci frontend

      - name: Trivy backend image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: aegiscare-backend:ci
          format: table
          exit-code: 0

      - name: Trivy frontend image scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: aegiscare-frontend:ci
          format: table
          exit-code: 0
